name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    # Runs at 12:00 AM UTC (every day)
    - cron: '0 0 * * *'

jobs:
  update-readme:
    name: Update Readme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update waka-readme
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          BLOCKS: "⬜⬜⬜⬜⬜⬜⬜⬜⬜⬜"
          LANG_COUNT: 10
          TIME_RANGE: "last_30_days"
